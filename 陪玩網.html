<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>九霄劍閣 - 陪玩師主頁</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 載入動畫 */
    .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-900 text-white antialiased pb-24 relative min-h-screen">

  <!-- 載入中遮罩 -->
  <div id="loadingOverlay" class="fixed inset-0 bg-gray-900 z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-gray-700 border-t-indigo-500 rounded-full loader mb-4"></div>
    <div class="text-gray-400 font-medium tracking-widest text-sm animate-pulse">讀取資料中...</div>
  </div>

  <!-- 提示訊息框 -->
  <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-lg z-[100] transition-all duration-300 opacity-0 pointer-events-none flex items-center gap-2 -translate-y-5 border border-gray-700 w-max max-w-[90vw]">
    <i id="toastIcon" class="fa-solid fa-circle-check text-green-400 text-lg"></i>
    <span id="toastMsg" class="text-sm font-medium">訊息</span>
  </div>

  <!-- 頂部導覽列 -->
  <div class="sticky top-0 z-40 bg-gray-900/80 backdrop-blur-md px-4 py-3 flex justify-between items-center">
    <button class="text-gray-300 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-800"><i class="fa-solid fa-chevron-left text-xl"></i></button>
    <div class="text-lg font-bold tracking-wider">個人名片</div>
    <button class="text-gray-300 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-800"><i class="fa-solid fa-share-nodes text-xl"></i></button>
  </div>

  <!-- 核心視覺區 -->
  <div class="flex flex-col items-center mt-4 px-4">
    <div class="relative">
      <img id="profileAvatar" src="" alt="頭像" class="w-28 h-28 md:w-32 md:h-32 rounded-full object-cover border-2 border-indigo-500/50 shadow-lg shadow-indigo-500/20">
      <div class="absolute bottom-1 right-1 md:bottom-2 md:right-2 w-5 h-5 bg-green-500 border-2 border-gray-900 rounded-full"></div>
    </div>
    
    <h1 class="text-2xl font-bold mt-4 flex items-center gap-2"><span id="profileName">載入中</span> <span class="text-pink-400 text-lg"><i class="fa-solid fa-venus"></i></span></h1>
    <p class="text-gray-400 text-sm mt-1">ID: <span id="profileId">----</span> • 綜合評分 <i class="fa-solid fa-star text-yellow-500"></i> <span id="profileRating">-.-</span></p>

    <button onclick="togglePlay()" class="mt-4 flex items-center gap-2 bg-gray-800 hover:bg-gray-700 active:scale-95 border border-gray-700 px-6 py-2.5 rounded-full transition-all w-full max-w-xs justify-center shadow-sm">
      <i id="playIcon" class="fa-solid fa-circle-play text-xl text-indigo-400"></i>
      <span id="playText" class="font-medium text-sm text-indigo-200">點擊試聽我的聲音 (0:15)</span>
    </button>
  </div>

  <!-- 人設標籤區 -->
  <div id="tagsContainer" class="flex flex-wrap justify-center gap-2 mt-6 px-4">
    <!-- 標籤會由 JS 動態生成 -->
  </div>

  <!-- 自我介紹 -->
  <div class="mt-8 px-5">
    <h2 class="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase">關於我</h2>
    <p id="profileIntro" class="text-gray-200 text-sm leading-relaxed bg-gray-800/50 p-4 rounded-2xl border border-gray-800 whitespace-pre-line">
      載入中...
    </p>
  </div>

  <!-- 服務項目清單 -->
  <div class="mt-8 px-5">
    <h2 class="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase">服務項目</h2>
    <div id="servicesContainer">
      <!-- 服務卡片會由 JS 動態生成 -->
    </div>
  </div>

  <!-- 顧客評價區 -->
  <div class="mt-8 px-5 pb-6">
    <div class="flex justify-between items-end mb-4">
      <h2 class="text-sm font-bold text-gray-400 tracking-widest uppercase">顧客評價</h2>
      <button class="text-xs text-indigo-400 font-medium hover:text-indigo-300 transition-colors">
        查看全部 <i class="fa-solid fa-chevron-right text-[10px] ml-1"></i>
      </button>
    </div>
    <div id="reviewsContainer">
      <!-- 評價卡片會由 JS 動態生成 -->
    </div>
  </div>

  <!-- 底部懸浮下單按鈕 -->
  <div class="fixed bottom-0 left-0 w-full bg-gray-900/95 backdrop-blur-sm border-t border-gray-800 p-4 pb-safe z-40">
    <button onclick="openModal()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.3)] transition-all transform active:scale-95 text-lg">
      立即預約
    </button>
  </div>

  <!-- 預約底部彈窗 -->
  <div id="modalOverlay" class="fixed inset-0 bg-black/70 z-[60] hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm" onclick="closeModal()"></div>
  <div id="bookingSheet" class="fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-700 rounded-t-3xl z-[70] transform translate-y-full transition-transform duration-300 ease-out p-6 pb-8 max-h-[90vh] overflow-y-auto no-scrollbar shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
    <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-5"></div>
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-gray-100">預約設定</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">選擇服務</label>
        <div class="relative">
          <select id="serviceSelect" onchange="calculateTotal()" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-gray-400 appearance-none transition-colors">
            <!-- 選項會由 JS 動態生成 -->
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400"><i class="fa-solid fa-chevron-down text-sm"></i></div>
        </div>
      </div>

      <div class="flex justify-between items-center bg-gray-800 border border-gray-700 rounded-xl p-3.5">
        <span class="text-gray-300 font-medium ml-1">購買數量 (<span id="unitDisplay" class="text-indigo-400">局</span>)</span>
        <div class="flex items-center gap-3">
          <button onclick="changeQuantity(-1)" class="w-9 h-9 rounded-full bg-gray-700 flex items-center justify-center text-gray-300 hover:bg-gray-600 active:scale-95 transition-all"><i class="fa-solid fa-minus text-sm"></i></button>
          <span id="quantityDisplay" class="text-lg font-bold w-6 text-center text-gray-100">1</span>
          <button onclick="changeQuantity(1)" class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white hover:bg-indigo-500 active:scale-95 transition-all"><i class="fa-solid fa-plus text-sm"></i></button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">您的 Discord ID <span class="text-xs text-gray-500 ml-1">*(必填)</span></label>
        <input type="text" id="discordId" placeholder="例如: User#1234" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-gray-400 transition-colors placeholder-gray-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">給陪玩師的備註 <span class="text-xs text-gray-500 ml-1">(選填)</span></label>
        <textarea id="memo" rows="2" placeholder="例如：我打野，求保排" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-gray-400 resize-none transition-colors placeholder-gray-500"></textarea>
      </div>
    </div>

    <div class="mt-8">
      <div class="flex justify-between items-end mb-3 px-1">
        <div class="text-gray-400 text-sm font-medium">總計金額</div>
        <div class="text-3xl font-bold text-indigo-400">NT$ <span id="totalPrice">0</span></div>
      </div>
      <button onclick="submitOrder()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.3)] transition-all transform active:scale-95 text-lg flex justify-center items-center gap-2">
        <span>確認送出並付款</span>
        <i class="fa-solid fa-arrow-right text-sm"></i>
      </button>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. 設定區：在這裡貼上你的 Google Apps Script 網址
    // ==========================================
    const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/library/d/10-0z7ydETtWf2fgBcMwCQXAVC6LHaMctCmyFfDlpb5TEd76xJ6Oaodsb/3"; 

    // 如果上面沒有填網址，就會預設使用這些假資料來預覽
    const mockData = {
      profile: {
        name: "小雪", id: "9527", rating: "4.9",
        avatar: "https://images.unsplash.com/photo-1583513702439-2e611c58e93d?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80",
        tags: "技術車隊,溫柔傾聽,不氣氛",
        intro: "哈囉！我是小雪。\n平時喜歡打傳說和特戰，如果你缺隊友或是想要有人陪你聊聊天，都可以找我喔！\n下單後我們直接在九霄劍閣的語音頻道見～ 🎮✨"
      },
      services: [
        { name: "傳說對決", desc: "星耀/王者區間可帶飛", price: 100, unit: "局", icon: "fa-gamepad", color: "indigo" },
        { name: "純語音聊天", desc: "唱歌、心事、叫起床", price: 200, unit: "小時", icon: "fa-microphone", color: "pink" }
      ],
      reviews: [
        { name: "夜王", date: "2026-03-15", rating: 5, service: "傳說對決", comment: "小雪的觀念超好！原本連敗的心情都好起來了，大推！", avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" },
        { name: "匿名玩家", date: "2026-03-12", rating: 4, service: "純語音聊天", comment: "聊天過程很放鬆，不會有壓力。", avatar: "" }
      ]
    };

    // ==========================================
    // 2. 初始化與讀取資料
    // ==========================================
    window.onload = async () => {
      try {
        if (GOOGLE_SHEET_API_URL) {
          const response = await fetch(GOOGLE_SHEET_API_URL);
          const data = await response.json();
          renderPage(data);
        } else {
          // 模擬網路延遲後顯示假資料
          setTimeout(() => renderPage(mockData), 800);
        }
      } catch (error) {
        console.error("讀取資料失敗:", error);
        showToast("伺服器連線失敗，請稍後再試", true);
      }
    };

    // ==========================================
    // 3. 將資料渲染到畫面上
    // ==========================================
    function renderPage(data) {
      // 確保 profile 存在，避免找不到屬性
      const profile = data.profile || {};

      // 填入個人基本資料 (加入預設防呆)
      document.getElementById('profileName').innerText = profile.name || '未命名';
      document.getElementById('profileId').innerText = profile.id || '----';
      document.getElementById('profileRating').innerText = profile.rating || '-.-';
      document.getElementById('profileAvatar').src = profile.avatar || 'https://images.unsplash.com/photo-1583513702439-2e611c58e93d?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80';
      document.getElementById('profileIntro').innerText = profile.intro || '這位陪玩師還沒有填寫自我介紹喔～';

      // 生成標籤 (加入 if 判斷，避免試算表沒寫 tags 導致報錯)
      let tagsHtml = '';
      if (profile.tags) {
        tagsHtml = String(profile.tags).split(',').filter(Boolean).map(tag => {
          return `<span class="bg-indigo-900/30 text-indigo-300 border border-indigo-700/50 px-3 py-1 rounded-full text-xs font-semibold tracking-wide">${tag.trim()}</span>`;
        }).join('');
      }
      document.getElementById('tagsContainer').innerHTML = tagsHtml;

      // 生成服務卡片與彈窗選單 (加上陣列防呆)
      let servicesHtml = '';
      let optionsHtml = '';
      const services = data.services || [];
      
      if (services.length === 0) {
        servicesHtml = '<div class="text-gray-500 text-sm text-center py-4">尚無服務項目</div>';
        optionsHtml = '<option value="0" data-unit="次">尚無服務項目</option>';
      } else {
        services.forEach(srv => {
          const srvColor = srv.color || 'indigo';
          const srvIcon = srv.icon || 'fa-gamepad';
          
          servicesHtml += `
            <div class="bg-gray-800 rounded-2xl p-4 mb-3 flex justify-between items-center border border-gray-700 shadow-sm">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-${srvColor}-900/40 text-${srvColor}-400 rounded-xl flex items-center justify-center text-xl border border-${srvColor}-700/50"><i class="fa-solid ${srvIcon}"></i></div>
                <div>
                  <h3 class="font-bold text-md text-gray-100">${srv.name || '未知服務'}</h3>
                  <p class="text-gray-400 text-xs mt-0.5">${srv.desc || ''}</p>
                </div>
              </div>
              <div class="text-right">
                <div class="text-${srvColor}-400 font-bold text-lg">NT$ ${srv.price || 0}</div>
                <div class="text-gray-500 text-xs">/ ${srv.unit || '次'}</div>
              </div>
            </div>
          `;
          optionsHtml += `<option value="${srv.price || 0}" data-unit="${srv.unit || '次'}">${srv.name || '未知服務'} (NT$ ${srv.price || 0} / ${srv.unit || '次'})</option>`;
        });
      }
      
      document.getElementById('servicesContainer').innerHTML = servicesHtml;
      document.getElementById('serviceSelect').innerHTML = optionsHtml;
      
      // 生成評價卡片 (加上陣列防呆)
      let reviewsHtml = '';
      const reviews = data.reviews || [];

      if (reviews.length === 0) {
        reviewsHtml = '<div class="text-gray-500 text-sm text-center py-4">目前還沒有評價喔～</div>';
      } else {
        reviews.forEach(rev => {
          let starsHtml = '';
          const rating = rev.rating || 5;
          for(let i=1; i<=5; i++) {
            starsHtml += i <= rating ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star text-gray-600"></i>';
          }
          
          let avatarHtml = rev.avatar 
            ? `<img src="${rev.avatar}" alt="頭像" class="w-9 h-9 rounded-full object-cover border border-gray-600">`
            : `<div class="w-9 h-9 rounded-full bg-gray-700 flex items-center justify-center text-gray-400 border border-gray-600"><i class="fa-solid fa-user text-sm"></i></div>`;

          reviewsHtml += `
            <div class="bg-gray-800 rounded-2xl p-4 mb-4 border border-gray-700 shadow-sm">
              <div class="flex justify-between items-start mb-3">
                <div class="flex items-center gap-3">
                  ${avatarHtml}
                  <div>
                    <div class="text-sm font-bold text-gray-200">${rev.name || '匿名玩家'}</div>
                    <div class="text-[10px] text-gray-500 mt-0.5">${rev.date || ''}</div>
                  </div>
                </div>
                <div class="flex text-yellow-500 text-[10px] mt-1 gap-0.5">${starsHtml}</div>
              </div>
              <div class="text-[11px] text-indigo-300 mb-2 font-medium bg-indigo-900/30 inline-block px-2 py-0.5 rounded border border-indigo-700/50">
                購買項目：${rev.service || '未知項目'}
              </div>
              <p class="text-sm text-gray-300 leading-relaxed">${rev.comment || '此玩家沒有留下文字評價。'}</p>
            </div>
          `;
        });
      }
      document.getElementById('reviewsContainer').innerHTML = reviewsHtml;

      // 隱藏載入動畫
      document.getElementById('loadingOverlay').classList.add('opacity-0', 'pointer-events-none');
      
      // 計算初始總金額
      calculateTotal();
    }

    // ==========================================
    // 4. 表單與互動邏輯 (與原本相同)
    // ==========================================
    let isPlaying = false;
    function togglePlay() {
      const icon = document.getElementById('playIcon');
      const text = document.getElementById('playText');
      isPlaying = !isPlaying;
      if (isPlaying) {
        icon.className = 'fa-solid fa-circle-pause text-xl text-pink-400';
        text.innerText = '語音播放中...';
        text.classList.add('text-pink-300'); text.classList.remove('text-indigo-200');
      } else {
        icon.className = 'fa-solid fa-circle-play text-xl text-indigo-400';
        text.innerText = '點擊試聽我的聲音 (0:15)';
        text.classList.remove('text-pink-300'); text.classList.add('text-indigo-200');
      }
    }

    let currentQuantity = 1;
    function calculateTotal() {
      const select = document.getElementById('serviceSelect');
      if(select.options.length === 0) return;
      const option = select.options[select.selectedIndex];
      document.getElementById('unitDisplay').innerText = option.getAttribute('data-unit') || '次';
      
      const price = parseInt(option.value) || 0;
      document.getElementById('totalPrice').innerText = price * currentQuantity;
    }

    function changeQuantity(change) {
      if (currentQuantity + change >= 1) {
        currentQuantity += change;
        document.getElementById('quantityDisplay').innerText = currentQuantity;
        calculateTotal();
      }
    }

    function openModal() {
      const overlay = document.getElementById('modalOverlay');
      const sheet = document.getElementById('bookingSheet');
      overlay.classList.remove('hidden'); void overlay.offsetWidth;
      overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
      sheet.classList.remove('translate-y-full');
      calculateTotal();
    }

    function closeModal() {
      const overlay = document.getElementById('modalOverlay');
      const sheet = document.getElementById('bookingSheet');
      sheet.classList.add('translate-y-full');
      overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
      setTimeout(() => overlay.classList.add('hidden'), 300);
    }

    let toastTimeout;
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      const toastIcon = document.getElementById('toastIcon');
      clearTimeout(toastTimeout);
      toastMsg.innerText = message;
      if (isError) {
        toastIcon.className = 'fa-solid fa-circle-exclamation text-red-400 text-lg';
        toast.className = 'fixed top-5 left-1/2 transform -translate-x-1/2 bg-red-900/90 border border-red-700 text-white px-5 py-3 rounded-full shadow-lg z-[100] transition-all duration-300 flex items-center gap-2 w-max max-w-[90vw] opacity-100 translate-y-0';
      } else {
        toastIcon.className = 'fa-solid fa-circle-check text-green-400 text-lg';
        toast.className = 'fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-gray-700 text-white px-5 py-3 rounded-full shadow-lg z-[100] transition-all duration-300 flex items-center gap-2 w-max max-w-[90vw] opacity-100 translate-y-0';
      }
      toastTimeout = setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0');
        toast.classList.add('opacity-0', '-translate-y-5');
      }, 3000);
    }

    function submitOrder() {
      const discordId = document.getElementById('discordId').value;
      const total = document.getElementById('totalPrice').innerText;
      if(!discordId.trim()) { showToast("請填寫 Discord ID 以便後續聯繫喔！", true); return; }
      
      showToast(`✅ 預約申請已送出！總金額：NT$ ${total}`);
      setTimeout(() => closeModal(), 1000);
      
      // 這裡未來可以加上寫入另一個 Google Sheet 訂單的功能
    }
  </script>
</body>
</html>
