<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>九霄劍閣 - 陪玩平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .view-enter { animation: slideIn 0.3s forwards ease-out; }
    .view-leave { animation: slideOut 0.3s forwards ease-in; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
  </style>
</head>
<body class="bg-gray-900 text-white antialiased min-h-screen relative overflow-x-hidden">

  <div id="loadingOverlay" class="fixed inset-0 bg-gray-900 z-[200] flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="w-12 h-12 border-4 border-gray-700 border-t-indigo-500 rounded-full loader mb-4"></div>
    <div class="text-gray-400 font-medium tracking-widest text-sm" id="loadingText">LINE 身分驗證中...</div>
  </div>

  <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-lg z-[100] transition-all duration-300 opacity-0 pointer-events-none flex items-center gap-2 w-max max-w-[90vw]">
    <i id="toastIcon" class="fa-solid fa-circle-check text-green-400 text-lg"></i>
    <span id="toastMsg" class="text-sm font-medium">訊息</span>
  </div>

  <div id="listView" class="w-full min-h-screen pb-10">
    <div class="sticky top-0 z-40 bg-gray-900/90 backdrop-blur-md px-5 py-4 border-b border-gray-800 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i class="fa-solid fa-gamepad text-white text-sm"></i>
        </div>
        <h1 class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">九霄陪玩</h1>
      </div>
      <div class="flex items-center gap-2" id="userProfileBadge">
        <span id="userNameDisplay" class="text-xs text-gray-400 font-medium">尚未登入</span>
        <img id="userAvatarDisplay" src="" class="w-7 h-7 rounded-full bg-gray-700 border border-gray-600 hidden object-cover">
      </div>
    </div>

    <div class="px-4 mt-4">
      <div class="w-full relative rounded-2xl overflow-hidden shadow-lg shadow-black/50 border border-gray-700/50 group cursor-pointer active:scale-[0.98] transition-transform">
        <img id="promoBannerImg" src="" alt="近期宣傳" class="w-full h-44 md:h-56 object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/40 to-transparent"></div>
        <div class="absolute bottom-3 left-4 right-4">
          <span id="promoBannerTag" class="bg-pink-500 text-white text-[10px] font-bold px-2 py-0.5 rounded tracking-wider shadow-sm"></span>
          <h2 id="promoBannerTitle" class="text-white font-bold text-lg mt-1.5 truncate shadow-sm"></h2>
        </div>
      </div>
    </div>

    <div class="flex gap-3 px-4 mt-6 overflow-x-auto no-scrollbar pb-2">
      <button class="bg-white text-gray-900 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap shadow-sm">全部</button>
      <button class="bg-gray-800 text-gray-300 border border-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap">傳說對決</button>
      <button class="bg-gray-800 text-gray-300 border border-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap">特戰英豪</button>
    </div>

    <div class="px-4 mt-5 mb-6">
      <h3 class="text-sm font-bold text-gray-400 mb-3 tracking-widest">精選導師</h3>
      <div id="companionsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4"></div>
    </div>
  </div>

  <div id="profileView" class="w-full min-h-screen pb-24 hidden absolute top-0 left-0 bg-gray-900 z-50">
    <div class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-md px-4 py-3 flex items-center border-b border-gray-800/50">
      <button onclick="goHome()" class="relative z-50 flex items-center gap-2 text-white bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-bold shadow-[0_0_15px_rgba(79,70,229,0.5)] transition-all active:scale-95">
        <i class="fa-solid fa-chevron-left"></i> 回到列表
      </button>
      <div class="absolute left-0 w-full text-center pointer-events-none">
        <span class="text-md font-bold tracking-widest text-gray-200" id="headerName">導師名片</span>
      </div>
    </div>

    <div class="flex flex-col items-center mt-6 px-4">
      <div class="relative">
        <img id="profileAvatar" src="" alt="頭像" class="w-28 h-28 md:w-32 md:h-32 rounded-full object-cover border-2 border-indigo-500/50 shadow-lg shadow-indigo-500/20">
        <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 border-2 border-gray-900 rounded-full"></div>
      </div>
      <h1 class="text-2xl font-bold mt-4 flex items-center gap-2"><span id="profileName">載入中</span></h1>
      <p class="text-gray-400 text-sm mt-1">ID: <span id="profileId">----</span> • 綜合評分 <i class="fa-solid fa-star text-yellow-500"></i> <span id="profileRating">-.-</span></p>
      
      <button onclick="togglePlay()" class="mt-4 flex items-center gap-2 bg-gray-800 hover:bg-gray-700 active:scale-95 border border-gray-700 px-6 py-2.5 rounded-full w-full max-w-xs justify-center shadow-sm transition-all">
        <i id="playIcon" class="fa-solid fa-circle-play text-lg text-indigo-400"></i>
        <span id="playText" class="font-bold text-sm text-indigo-200 tracking-wider">點擊試聽專屬語音</span>
      </button>
    </div>

    <div id="tagsContainer" class="flex flex-wrap justify-center gap-2 mt-5 px-4"></div>

    <div class="mt-8 px-5">
      <h2 class="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase border-l-4 border-indigo-500 pl-2">關於我</h2>
      <p id="profileIntro" class="text-gray-200 text-sm leading-relaxed bg-gray-800/40 p-5 rounded-2xl border border-gray-800 whitespace-pre-line"></p>
    </div>

    <div class="mt-8 px-5">
      <h2 class="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase border-l-4 border-pink-500 pl-2">服務項目</h2>
      <div id="servicesContainer"></div>
    </div>

    <div class="mt-8 px-5 pb-6">
      <h2 class="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase border-l-4 border-yellow-500 pl-2">顧客評價</h2>
      <div id="reviewsContainer"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-gray-900/95 backdrop-blur-sm border-t border-gray-800 p-4 pb-safe z-50">
      <button onclick="openModal()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.4)] transition-all transform active:scale-95 text-lg">
        立即預約
      </button>
    </div>
  </div>

  <div id="modalOverlay" class="fixed inset-0 bg-black/70 z-[60] hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm" onclick="closeModal()"></div>
  <div id="bookingSheet" class="fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-700 rounded-t-3xl z-[70] transform translate-y-full transition-transform duration-300 ease-out p-6 pb-8 max-h-[90vh] overflow-y-auto no-scrollbar shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
    <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-5"></div>
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-gray-100">預約 <span id="modalTargetName" class="text-indigo-400"></span></h2>
      <button onclick="closeModal()" class="text-gray-400 bg-gray-800 w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">選擇服務</label>
        <div class="relative">
          <select id="serviceSelect" onchange="calculateTotal()" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 focus:outline-none appearance-none"></select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400"><i class="fa-solid fa-chevron-down text-sm"></i></div>
        </div>
      </div>
      <div class="flex justify-between items-center bg-gray-800 border border-gray-700 rounded-xl p-3.5">
        <span class="text-gray-300 font-medium ml-1">購買數量 (<span id="unitDisplay" class="text-indigo-400">局</span>)</span>
        <div class="flex items-center gap-3">
          <button onclick="changeQuantity(-1)" class="w-9 h-9 rounded-full bg-gray-700 text-gray-300 active:scale-95"><i class="fa-solid fa-minus text-sm"></i></button>
          <span id="quantityDisplay" class="text-lg font-bold w-6 text-center text-gray-100">1</span>
          <button onclick="changeQuantity(1)" class="w-9 h-9 rounded-full bg-indigo-600 text-white active:scale-95"><i class="fa-solid fa-plus text-sm"></i></button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">您的 Discord ID</label>
        <input type="text" id="discordId" placeholder="例如: User#1234" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">優惠代碼 (選填)</label>
        <div class="flex gap-2">
          <input type="text" id="promoCode" placeholder="輸入代碼" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-indigo-500 uppercase transition-colors">
          <button onclick="applyPromo()" class="bg-gray-700 hover:bg-gray-600 text-white px-5 rounded-xl font-medium transition-colors whitespace-nowrap active:scale-95">套用</button>
        </div>
        <p id="promoMsg" class="text-xs mt-2 hidden"></p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">備註 (選填)</label>
        <textarea id="memo" rows="2" placeholder="例如：我打野，求保排" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 resize-none"></textarea>
      </div>
    </div>
    <div class="mt-8">
      <div class="flex justify-between items-end mb-3 px-1">
        <div>
          <div class="text-gray-400 text-sm font-medium">總計金額</div>
          <div id="originalPriceDisplay" class="text-xs text-gray-500 line-through hidden mt-1">原價 NT$ 0</div>
        </div>
        <div class="text-3xl font-bold text-indigo-400">NT$ <span id="totalPrice">0</span></div>
      </div>
      <button id="submitBtn" onclick="submitOrder()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.3)] active:scale-95 text-lg flex justify-center items-center gap-2 mt-2">
        <span>確認送出訂單</span><i class="fa-solid fa-paper-plane text-sm"></i>
      </button>
    </div>
  </div>

  <script>
    // 🌟 你的 LIFF ID 填在這裡
    const MY_LIFF_ID = "2009198027-4SP09i5g";
    
    // 官方 LINE 備用連結 (如果客人在電腦看，發不出訊息時會用這個轉跳)
    const LINE_OFFICIAL_URL = "https://lin.ee/SCJu62o";

    const PROMO_CODES = {
      "NEW80": { type: "percent", value: 0.8, desc: "新客 8 折優惠" },
      "FOX50": { type: "fixed", value: 50, desc: "折抵 50 元" }
    };

    const DATABASE = {
      banner: {
        image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
        tag: "限時活動",
        title: "九霄劍閣全新上線！指定導師享優惠"
      },
      companions: [
        { id: "c01", name: "小雪", rating: "4.9", tags: "技術車隊,溫柔", intro: "哈囉我是小雪！特戰、傳說常駐！下班後缺隊友來找我玩～", avatar: "https://images.unsplash.com/photo-1583513702439-2e611c58e93d?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { id: "c02", name: "夜神", rating: "5.0", tags: "頂尖射手,上分", intro: "各路皆通，保證上分，不C包退。想學觀念也可以找我。", avatar: "https://images.unsplash.com/photo-1564564321837-a57b7070ac4f?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", audio: "" },
        { id: "c03", name: "兔兔", rating: "4.8", tags: "氣氛組,唱歌", intro: "聲音甜美，可以唱歌給你聽喔～最喜歡玩語音房了！", avatar: "https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", audio: "" }
      ],
      services: [
        { companion_id: "c01", name: "傳說對決", desc: "星耀區間帶飛", price: 100, unit: "局", icon: "fa-gamepad", color: "indigo" },
        { companion_id: "c01", name: "純語音聊天", desc: "聊天解悶", price: 200, unit: "小時", icon: "fa-microphone", color: "pink" },
        { companion_id: "c02", name: "特戰英豪", desc: "神話場可排", price: 150, unit: "場", icon: "fa-crosshairs", color: "red" },
        { companion_id: "c03", name: "叫起床服務", desc: "早晨專屬", price: 50, unit: "次", icon: "fa-bell", color: "yellow" }
      ],
      reviews: [
        { companion_id: "c01", name: "夜王", date: "2026-03-15", rating: 5, service: "傳說對決", comment: "小雪觀念超好！", avatar: "" }
      ]
    };

    let currentCompanionId = null; 
    let currentQuantity = 1;
    let activePromo = null; 
    let userProfile = null; // 儲存客人的 LINE 資料
    
    const audioPlayer = new Audio();
    let isPlaying = false;

    // 🌟 網頁一載入，立刻啟動 LIFF 魔法！
    window.onload = async () => {
      try {
        // 先把基本畫面渲染好
        document.getElementById('promoBannerImg').src = DATABASE.banner.image;
        document.getElementById('promoBannerTag').innerText = DATABASE.banner.tag;
        document.getElementById('promoBannerTitle').innerText = DATABASE.banner.title;
        renderList(DATABASE.companions);
        
        // 啟動 LIFF
        await liff.init({ liffId: MY_LIFF_ID });
        
        // 檢查客人是不是從 LINE 裡面打開的
        if (liff.isLoggedIn()) {
          userProfile = await liff.getProfile();
          // 把大頭貼跟名字顯示在首頁右上角
          document.getElementById('userNameDisplay').innerText = userProfile.displayName;
          if (userProfile.pictureUrl) {
            document.getElementById('userAvatarDisplay').src = userProfile.pictureUrl;
            document.getElementById('userAvatarDisplay').classList.remove('hidden');
          }
        } else {
          // 如果沒有登入 (例如用電腦瀏覽器開啟)，可選：強迫登入 liff.login();
          document.getElementById('userNameDisplay').innerText = "外部瀏覽";
        }
      } catch (err) {
        console.error("LIFF 啟動失敗:", err);
      } finally {
        // 關閉轉圈圈載入畫面
        document.getElementById('loadingOverlay').classList.add('opacity-0', 'pointer-events-none');
      }
    };

    function renderList(companions) {
      const grid = document.getElementById('companionsGrid');
      let html = '';
      companions.forEach(c => {
        const firstTag = (c.tags || '').split(',')[0] || '人氣導師';
        html += `
          <div onclick="openProfile('${c.id}')" class="bg-gray-800 rounded-2xl overflow-hidden border border-gray-700 shadow-md transform transition active:scale-95 cursor-pointer">
            <div class="h-32 w-full bg-gray-700 relative">
              <img src="${c.avatar || ''}" class="w-full h-full object-cover">
              <div class="absolute bottom-2 left-2 bg-black/60 backdrop-blur-sm px-2 py-0.5 rounded text-[10px] text-white border border-white/20">
                <i class="fa-solid fa-star text-yellow-400 mr-1"></i>${c.rating || '5.0'}
              </div>
            </div>
            <div class="p-3">
              <h3 class="font-bold text-gray-100 text-sm truncate">${c.name || '導師'}</h3>
              <div class="text-[11px] text-indigo-400 mt-1 bg-indigo-900/30 inline-block px-1.5 py-0.5 rounded border border-indigo-700/50 truncate max-w-full">
                ${firstTag}
              </div>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    function openProfile(id) {
      currentCompanionId = id;
      const companion = DATABASE.companions.find(c => c.id === id);
      if(!companion) return;

      document.getElementById('headerName').innerText = companion.name;
      document.getElementById('profileName').innerText = companion.name;
      document.getElementById('profileId').innerText = companion.id;
      document.getElementById('profileRating').innerText = companion.rating;
      document.getElementById('profileAvatar').src = companion.avatar;
      document.getElementById('profileIntro').innerText = companion.intro;
      document.getElementById('modalTargetName').innerText = `- ${companion.name}`;

      audioPlayer.src = companion.audio || "";
      resetPlayButton();

      let tagsHtml = (companion.tags || '').split(',').filter(Boolean).map(tag => 
        `<span class="bg-indigo-900/30 text-indigo-300 border border-indigo-700/50 px-3 py-1 rounded-full text-xs font-semibold">${tag.trim()}</span>`
      ).join('');
      document.getElementById('tagsContainer').innerHTML = tagsHtml;

      const myServices = DATABASE.services.filter(s => s.companion_id === id);
      const myReviews = DATABASE.reviews.filter(r => r.companion_id === id);

      let servicesHtml = ''; let optionsHtml = '';
      myServices.forEach(srv => {
        const clr = srv.color || 'indigo'; const icn = srv.icon || 'fa-gamepad';
        servicesHtml += `
          <div class="bg-gray-800 rounded-2xl p-4 mb-3 flex justify-between items-center border border-gray-700">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-${clr}-900/40 text-${clr}-400 rounded-xl flex justify-center items-center text-xl border border-${clr}-700/50"><i class="fa-solid ${icn}"></i></div>
              <div><h3 class="font-bold text-gray-100">${srv.name}</h3><p class="text-gray-400 text-xs">${srv.desc}</p></div>
            </div>
            <div class="text-right"><div class="text-${clr}-400 font-bold">NT$ ${srv.price}</div><div class="text-gray-500 text-xs">/ ${srv.unit}</div></div>
          </div>`;
        optionsHtml += `<option value="${srv.price}" data-unit="${srv.unit}">${srv.name} (NT$ ${srv.price} / ${srv.unit})</option>`;
      });
      document.getElementById('servicesContainer').innerHTML = servicesHtml || '<p class="text-gray-500 text-sm">尚無服務</p>';
      document.getElementById('serviceSelect').innerHTML = optionsHtml;

      let reviewsHtml = '';
      myReviews.forEach(rev => {
        let stars = ''; for(let i=1; i<=5; i++) stars += i <= rev.rating ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star text-gray-600"></i>';
        reviewsHtml += `
          <div class="bg-gray-800 rounded-2xl p-4 mb-3 border border-gray-700">
            <div class="flex justify-between mb-2">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-gray-700 flex justify-center items-center text-gray-400"><i class="fa-solid fa-user text-xs"></i></div>
                <div><div class="text-sm font-bold text-gray-200">${rev.name}</div><div class="text-[10px] text-gray-500">${rev.date}</div></div>
              </div>
              <div class="flex text-yellow-500 text-[10px] gap-0.5">${stars}</div>
            </div>
            <p class="text-sm text-gray-300">${rev.comment}</p>
          </div>`;
      });
      document.getElementById('reviewsContainer').innerHTML = reviewsHtml || '<p class="text-gray-500 text-sm">目前無評價</p>';

      const profile = document.getElementById('profileView');
      profile.classList.remove('hidden');
      profile.classList.add('view-enter');
      window.scrollTo(0, 0); 
    }

    function goHome() {
      audioPlayer.pause();
      resetPlayButton();
      closeModal();       
      
      const profile = document.getElementById('profileView');
      profile.classList.remove('view-enter');
      profile.classList.add('view-leave');
      
      setTimeout(() => {
        profile.classList.add('hidden');
        profile.classList.remove('view-leave');
        currentCompanionId = null;
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
      }, 300);
    }

    function togglePlay() {
      const icon = document.getElementById('playIcon'); 
      const text = document.getElementById('playText');
      if (!audioPlayer.src || audioPlayer.src.endsWith("undefined")) return showToast("這位導師還沒有上傳專屬語音喔！", true);
      
      if (isPlaying) { audioPlayer.pause(); resetPlayButton(); } 
      else { audioPlayer.play(); isPlaying = true; icon.className = 'fa-solid fa-circle-pause text-lg text-pink-400'; text.innerText = '語音播放中...'; text.className = 'font-bold text-sm text-pink-300 tracking-wider'; }
    }
    audioPlayer.onended = resetPlayButton;
    function resetPlayButton() {
      isPlaying = false; const icon = document.getElementById('playIcon'); const text = document.getElementById('playText');
      if(icon && text) { icon.className = 'fa-solid fa-circle-play text-lg text-indigo-400'; text.innerText = '點擊試聽專屬語音'; text.className = 'font-bold text-sm text-indigo-200 tracking-wider'; }
    }

    function applyPromo() {
      const codeInput = document.getElementById('promoCode').value.trim().toUpperCase();
      const msgEl = document.getElementById('promoMsg');
      if (!codeInput) { activePromo = null; msgEl.className = "text-xs mt-2 hidden"; calculateTotal(); return; }

      if (PROMO_CODES[codeInput]) {
        activePromo = PROMO_CODES[codeInput]; msgEl.innerText = `✅ 已套用：${activePromo.desc}`; msgEl.className = "text-xs mt-2 text-green-400 block";
      } else {
        activePromo = null; msgEl.innerText = `❌ 無效的優惠代碼`; msgEl.className = "text-xs mt-2 text-red-400 block";
      }
      calculateTotal();
    }

    function calculateTotal() {
      const sel = document.getElementById('serviceSelect');
      if(!sel.options.length) return;
      const opt = sel.options[sel.selectedIndex];
      document.getElementById('unitDisplay').innerText = opt.getAttribute('data-unit');
      let originalPrice = parseInt(opt.value) * currentQuantity;
      let finalPrice = originalPrice;

      if (activePromo) {
        if (activePromo.type === 'percent') finalPrice = Math.floor(originalPrice * activePromo.value);
        else if (activePromo.type === 'fixed') finalPrice = Math.max(0, originalPrice - activePromo.value); 
      }
      document.getElementById('totalPrice').innerText = finalPrice;
      const origDisplay = document.getElementById('originalPriceDisplay');
      if (originalPrice !== finalPrice) { origDisplay.innerText = `原價 NT$ ${originalPrice}`; origDisplay.classList.remove('hidden'); } 
      else { origDisplay.classList.add('hidden'); }
    }

    function changeQuantity(c) {
      if(currentQuantity + c >= 1) { currentQuantity += c; document.getElementById('quantityDisplay').innerText = currentQuantity; calculateTotal(); }
    }

    function openModal() {
      const overlay = document.getElementById('modalOverlay'); const sheet = document.getElementById('bookingSheet');
      overlay.classList.remove('hidden'); void overlay.offsetWidth; overlay.classList.replace('opacity-0', 'opacity-100');
      sheet.classList.remove('translate-y-full');
      currentQuantity = 1; document.getElementById('quantityDisplay').innerText = 1;
      document.getElementById('promoCode').value = ''; document.getElementById('promoMsg').className = "text-xs mt-2 hidden";
      activePromo = null; calculateTotal();
    }

    function closeModal() {
      const overlay = document.getElementById('modalOverlay'); const sheet = document.getElementById('bookingSheet');
      sheet.classList.add('translate-y-full'); overlay.classList.replace('opacity-100', 'opacity-0');
      setTimeout(() => overlay.classList.add('hidden'), 300);
    }

    function showToast(msg, isError=false) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').innerText = msg;
      document.getElementById('toastIcon').className = isError ? 'fa-solid fa-circle-exclamation text-red-400 text-lg' : 'fa-solid fa-circle-check text-green-400 text-lg';
      toast.classList.replace('opacity-0', 'opacity-100'); toast.classList.replace('-translate-y-5', 'translate-y-0');
      setTimeout(() => { toast.classList.replace('opacity-100', 'opacity-0'); toast.classList.replace('translate-y-0', '-translate-y-5'); }, 3000);
    }

    // 🌟 全新送出訂單邏輯：透過 LINE 自動發送文字給客服
    async function submitOrder() {
      const discordId = document.getElementById('discordId').value;
      if(!discordId.trim()) return showToast("請填寫 Discord ID！", true);
      
      const btn = document.getElementById('submitBtn');
      const ogHtml = btn.innerHTML;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...'; btn.disabled = true;

      // 1. 整理要發送的訂單文字
      const companionName = document.getElementById('headerName').innerText;
      const serviceSelect = document.getElementById('serviceSelect');
      const serviceName = serviceSelect.options[serviceSelect.selectedIndex].text.split(' (')[0];
      const qty = document.getElementById('quantityDisplay').innerText;
      const unit = document.getElementById('unitDisplay').innerText;
      const total = document.getElementById('totalPrice').innerText;
      const memo = document.getElementById('memo').value || "無";
      const promoText = document.getElementById('promoCode').value ? `(已套用代碼: ${document.getElementById('promoCode').value})` : "";
      
      // 組合超美觀的訂單訊息
      const orderMessage = `【九霄劍閣 - 預約單】\n\n🌸 導師：${companionName}\n🎮 服務：${serviceName} x ${qty}${unit}\n💰 總計：NT$ ${total} ${promoText}\n💬 Discord ID：${discordId}\n📝 備註：${memo}`;

      try {
        // 2. 判斷客人是否在 LINE 裡面操作
        if (liff.isLoggedIn() && liff.isInClient()) {
          // 直接用客人的帳號發送訊息到你們的官方 LINE！
          await liff.sendMessages([{
            type: "text",
            text: orderMessage
          }]);
          
          showToast("✅ 預約單已發送給客服！即將關閉視窗...");
          
          // 3. 發送成功後，自動關閉網頁回到聊天室
          setTimeout(() => { 
            closeModal(); 
            liff.closeWindow(); 
          }, 2000);

        } else {
          // 如果客人是用電腦的 Chrome 瀏覽器打開的，沒辦法自動發送
          // 就退而求其次，顯示成功並引導他跳轉到官方 LINE
          showToast("✅ 預約已記錄！即將轉接客服人員...");
          setTimeout(() => { 
            closeModal(); 
            window.location.href = LINE_OFFICIAL_URL; 
          }, 1500);
        }
      } catch (error) {
        console.error("發送訊息失敗:", error);
        showToast("⚠️ 發送失敗，即將為您轉接客服...", true);
        setTimeout(() => { window.location.href = LINE_OFFICIAL_URL; }, 1500);
      } finally {
        btn.innerHTML = ogHtml; 
        btn.disabled = false;
      }
    }
  </script>
</body>
