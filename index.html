<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>九霄劍閣 - 陪玩平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .view-enter { animation: slideIn 0.3s forwards ease-out; }
    .view-leave { animation: slideOut 0.3s forwards ease-in; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
  </style>
</head>
<body class="bg-gray-900 text-white antialiased min-h-screen relative overflow-x-hidden">

  <div id="loadingOverlay" class="fixed inset-0 bg-gray-900 z-[200] flex flex-col items-center justify-center transition-opacity duration-300">

    <div class="text-gray-400 font-medium tracking-widest text-sm" id="loadingText">系統載入中...</div>
  </div>

  <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-lg z-[100] transition-all duration-300 opacity-0 pointer-events-none flex items-center gap-2 w-max max-w-[90vw]">

    <span id="toastMsg" class="text-sm font-medium">訊息</span>
  </div>

      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i class="fa-solid fa-gamepad text-white text-sm"></i>
        </div>
        <h1 class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">九霄劍閣</h1>
      </div>
      <div class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform bg-gray-800/50 px-2 py-1 rounded-full border border-gray-700" id="userProfileBadge" onclick="openMyProfile()">

        <img id="userAvatarDisplay" src="" class="w-7 h-7 rounded-full bg-gray-700 border border-gray-500 hidden object-cover shadow-sm">

    <div class="px-4 mt-4">

          <h2 id="promoBannerTitle" class="text-white font-bold text-lg mt-1.5 truncate shadow-sm"></h2>
        </div>
      </div>
    </div>

    <div class="flex gap-3 px-4 mt-6 overflow-x-auto no-scrollbar pb-2" id="categoryTabs">
      <button onclick="filterCategory('全部', this)" class="cat-btn bg-white text-gray-900 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap shadow-sm transition-all">全部</button>
      <button onclick="filterCategory('傳說對決', this)" class="cat-btn bg-gray-800 text-gray-300 border border-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">傳說對決</button>
      <button onclick="filterCategory('特戰英豪', this)" class="cat-btn bg-gray-800 text-gray-300 border border-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">特戰英豪</button>

    <div class="px-4 mt-5 mb-6">

  <div id="profileView" class="w-full min-h-screen pb-24 hidden absolute top-0 left-0 bg-gray-900 z-50">

      <button onclick="goHome()" class="relative z-50 flex items-center gap-2 text-white bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-bold shadow-[0_0_15px_rgba(79,70,229,0.5)] transition-all active:scale-95">

      <p class="text-gray-400 text-sm mt-1">ID: <span id="profileId">----</span> • 綜合評分 <i class="fa-solid fa-star text-yellow-500"></i> <span id="profileRating">-.-</span></p>

        <span id="playText" class="font-bold text-sm text-indigo-200 tracking-wider">點擊試聽專屬語音</span>

    <div id="tagsContainer" class="flex flex-wrap justify-center gap-2 mt-5 px-4"></div>
    <div class="mt-8 px-5">
      <h2 class="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase border-l-4 border-indigo-500 pl-2">關於我</h2>
      <p id="profileIntro" class="text-gray-200 text-sm leading-relaxed bg-gray-800/40 p-5 rounded-2xl border border-gray-800 whitespace-pre-line"></p>
    </div>
    <div class="mt-8 px-5">
      <h2 class="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase border-l-4 border-pink-500 pl-2">服務項目</h2>
      <div id="servicesContainer"></div>
    </div>
    <div class="mt-8 px-5 pb-6">

      <div id="reviewsContainer"></div>
    </div>
    <div class="fixed bottom-0 left-0 w-full bg-gray-900/95 backdrop-blur-sm border-t border-gray-800 p-4 pb-safe z-50">
      <button onclick="openModal()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.4)] transition-all transform active:scale-95 text-lg">立即預約</button>
    </div>
  </div>

  <div id="myProfileView" class="w-full min-h-screen pb-24 hidden absolute top-0 left-0 bg-gray-900 z-[80]">
    <div class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-md px-4 py-3 flex items-center border-b border-gray-800/50">
      <button onclick="closeMyProfile()" class="relative z-50 flex items-center gap-2 text-white bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-xl text-sm font-bold shadow-sm transition-all active:scale-95">
        <i class="fa-solid fa-chevron-left"></i> 返回
      </button>
      <div class="absolute left-0 w-full text-center pointer-events-none">
        <span class="text-md font-bold tracking-widest text-gray-200">個人中心</span>
      </div>
    </div>
    <div class="px-5 mt-8 flex flex-col items-center">
      <img id="myProfileAvatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="w-24 h-24 rounded-full object-cover border-4 border-gray-700 shadow-lg">
      <h2 id="myProfileName" class="text-2xl font-bold mt-4 text-white">載入中...</h2>
      <div class="mt-2 flex items-center gap-1.5 text-xs font-medium text-pink-400 bg-pink-900/30 px-3 py-1 rounded-full border border-pink-700/50">
        <i class="fa-solid fa-crown"></i> 尊爵會員
      </div>
    </div>
    <div class="px-5 mt-8">
      <div class="bg-gradient-to-br from-gray-800 to-gray-800/50 p-6 rounded-2xl border border-gray-700 shadow-lg relative overflow-hidden">
        <i class="fa-solid fa-coins absolute -right-4 -bottom-4 text-6xl text-gray-700/30"></i>
        <h3 class="text-gray-400 text-sm font-medium mb-1">累積消費總額</h3>
        <div class="flex items-end gap-2">
          <span class="text-indigo-400 font-bold text-lg">NT$</span>
          <span id="myTotalSpent" class="text-white text-4xl font-bold tracking-tight">0</span>
        </div>
        <div class="mt-4 w-full bg-gray-700 rounded-full h-1.5">
          <div class="bg-gradient-to-r from-indigo-500 to-pink-500 h-1.5 rounded-full" style="width: 45%"></div>
        </div>
        <p class="text-xs text-gray-500 mt-2">系統將自動統計您的歷史預約紀錄</p>
      </div>
    </div>
    <div class="px-5 mt-6 space-y-3">
      <button onclick="openHistory()" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-xl flex justify-between items-center active:scale-[0.98] transition-all">
        <div class="flex items-center gap-3 text-gray-200"><i class="fa-solid fa-list-ul text-indigo-400 w-5"></i> 歷史訂單</div>
        <i class="fa-solid fa-chevron-right text-gray-500 text-sm"></i>
      </button>
      <button onclick="window.location.href=LINE_OFFICIAL_URL" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-xl flex justify-between items-center active:scale-[0.98] transition-all">
        <div class="flex items-center gap-3 text-gray-200"><i class="fa-solid fa-headset text-pink-400 w-5"></i> 聯絡客服</div>
        <i class="fa-solid fa-chevron-right text-gray-500 text-sm"></i>
      </button>
    </div>
  </div>

  <div id="historyView" class="w-full min-h-screen pb-24 hidden absolute top-0 left-0 bg-gray-900 z-[90]">
    <div class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-md px-4 py-3 flex items-center border-b border-gray-800/50">
      <button onclick="closeHistory()" class="relative z-50 flex items-center gap-2 text-white bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-xl text-sm font-bold shadow-sm transition-all active:scale-95">
        <i class="fa-solid fa-chevron-left"></i> 返回
      </button>
      <div class="absolute left-0 w-full text-center pointer-events-none">
        <span class="text-md font-bold tracking-widest text-gray-200">歷史訂單</span>
      </div>
    </div>
    
    <div class="px-4 mt-6">
      <div id="historyLoading" class="text-center py-10 text-gray-400 text-sm">
        <i class="fa-solid fa-spinner fa-spin text-2xl text-indigo-500 mb-3"></i><br>正在讀取訂單資料...
      </div>
      <div id="historyListContainer" class="space-y-4 hidden"></div>
    </div>
  </div>

  <div id="modalOverlay" class="fixed inset-0 bg-black/70 z-[60] hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm" onclick="closeModal()"></div>
  <div id="bookingSheet" class="fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-700 rounded-t-3xl z-[70] transform translate-y-full transition-transform duration-300 ease-out p-6 pb-8 max-h-[90vh] overflow-y-auto no-scrollbar shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
    <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-5"></div>
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-gray-100">預約 <span id="modalTargetName" class="text-indigo-400"></span></h2>
      <button onclick="closeModal()" class="text-gray-400 bg-gray-800 w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">選擇服務</label>
        <div class="relative">
          <select id="serviceSelect" onchange="calculateTotal()" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 focus:outline-none appearance-none"></select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400"><i class="fa-solid fa-chevron-down text-sm"></i></div>
        </div>
      </div>
      <div class="flex justify-between items-center bg-gray-800 border border-gray-700 rounded-xl p-3.5">
        <span class="text-gray-300 font-medium ml-1">購買數量 (<span id="unitDisplay" class="text-indigo-400">局</span>)</span>
        <div class="flex items-center gap-3">
          <button onclick="changeQuantity(-1)" class="w-9 h-9 rounded-full bg-gray-700 text-gray-300 active:scale-95"><i class="fa-solid fa-minus text-sm"></i></button>
          <span id="quantityDisplay" class="text-lg font-bold w-6 text-center text-gray-100">1</span>
          <button onclick="changeQuantity(1)" class="w-9 h-9 rounded-full bg-indigo-600 text-white active:scale-95"><i class="fa-solid fa-plus text-sm"></i></button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">您的 Discord ID</label>
        <input type="text" id="discordId" placeholder="例如: User#1234" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5">
      </div>
      <div class="hidden"><input type="text" id="promoCode" value=""></div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">備註 (選填)</label>
        <textarea id="memo" rows="2" placeholder="例如：我打野，求保排" class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3.5 resize-none"></textarea>
      </div>
    </div>
    <div class="mt-8">
      <div class="flex justify-between items-end mb-3 px-1">
        <div class="text-gray-400 text-sm font-medium">總計金額</div>
        <div class="text-3xl font-bold text-indigo-400">NT$ <span id="totalPrice">0</span></div>
      </div>
      <button id="submitBtn" onclick="submitOrder()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.3)] active:scale-95 text-lg flex justify-center items-center gap-2 mt-2">
        <span>確認送出訂單</span><i class="fa-solid fa-paper-plane text-sm"></i>
      </button>
    </div>
  </div>

  <script>
    const MY_LIFF_ID = "2009198027-4SP09i5g";
    const LINE_OFFICIAL_URL = "https://lin.ee/9XKIAym"; 
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxLHqedAI8AULCuTTc5c_HAidiCm5i_m1rF-mmw82B11PmswvY8tlPoQh86gLWIo-ENkg/exec";

    // 資料庫設定
    const DATABASE = {
      banner: {
        image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
        tag: "限時活動", title: "九霄陪玩招生中!加入首月 0 抽成"
      },
      companions: [
        { 
          id: "c01", name: "小熏", rating: "5", tags: "傳說對決,娛樂型陪玩,可愛", 
          intro: "你好呀我是千熏 可以叫我小熏！娛樂型陪玩~我個性非常活潑 特別開朗 不怕沒有話可以接 我嘰哩呱啦的一定比你吵໒꒰ྀི ´͈ ᵕ `͈ ꒱ྀི১我還有很多皮膚 快來找我玩！", 
          avatar: "https://i.meee.com.tw/guTD9Nw.jpg", 
          gallery: [
            "https://i.meee.com.tw/guTD9Nw.jpg",
            "https://i.meee.com.tw/5nl30w4.jpg"
          ], audio: "" 
        },
        { 
          id: "c02", name: "夜神", rating: "5.0", tags: "特戰英豪,頂尖射手,上分", 
          intro: "各路皆通，保證上分，不C包退。", 
          avatar: "https://images.unsplash.com/photo-1564564321837-a57b7070ac4f?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", 
          gallery: ["https://images.unsplash.com/photo-1564564321837-a57b7070ac4f?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"], audio: "" 
        },
        { 
          id: "c03", name: "兔兔", rating: "4.8", tags: "語音聊天,唱歌", 
          intro: "聲音甜美，可以唱歌給你聽喔～", 
          avatar: "https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", 
          gallery: [
            "https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
          ], audio: "" 
        }
      ],
      services: [
        { companion_id: "c01", name: "傳說對決", desc: "星耀區間帶飛", price: 100, unit: "局", icon: "fa-gamepad", color: "indigo" },
        { companion_id: "c02", name: "特戰英豪", desc: "神話場可排", price: 150, unit: "場", icon: "fa-crosshairs", color: "red" },
        { companion_id: "c03", name: "語音聊天", desc: "純聊天解悶", price: 200, unit: "小時", icon: "fa-microphone", color: "pink" }
      ]
    };

    let currentCompanionId = null; let currentQuantity = 1; let userProfile = null; 
    const audioPlayer = new Audio(); let isPlaying = false;

    window.onload = async () => {
      try {
        document.getElementById('promoBannerImg').src = DATABASE.banner.image;
        document.getElementById('promoBannerTag').innerText = DATABASE.banner.tag;
        document.getElementById('promoBannerTitle').innerText = DATABASE.banner.title;
        renderList(DATABASE.companions);

        await liff.init({ liffId: MY_LIFF_ID });
        if (liff.isLoggedIn()) {
          userProfile = await liff.getProfile();
          document.getElementById('userNameDisplay').innerText = userProfile.displayName;
          if (userProfile.pictureUrl) {
            document.getElementById('userAvatarDisplay').src = userProfile.pictureUrl;
            document.getElementById('userAvatarDisplay').classList.remove('hidden');
          }
        } else { liff.login(); }
      } catch (err) { console.error("LIFF 錯誤:", err); } 
      finally { document.getElementById('loadingOverlay').classList.add('opacity-0', 'pointer-events-none'); }
    };

    async function openMyProfile() {
      const myProfileView = document.getElementById('myProfileView');
      myProfileView.classList.remove('hidden'); myProfileView.classList.add('view-enter');
      window.scrollTo(0, 0);

      let uid = userProfile ? userProfile.userId : "test_uid";
      if (userProfile) {
        document.getElementById('myProfileName').innerText = userProfile.displayName;
        if (userProfile.pictureUrl) document.getElementById('myProfileAvatar').src = userProfile.pictureUrl;
      }
      document.getElementById('myTotalSpent').innerText = "...";

      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, 
          body: JSON.stringify({ action: 'getProfile', lineUid: uid })
        });
        const result = await response.json();
        if (result.status === "success") document.getElementById('myTotalSpent').innerText = result.totalSpent.toLocaleString();
        else document.getElementById('myTotalSpent').innerText = "0";
      } catch (error) {
        document.getElementById('myTotalSpent').innerText = "0";
        showToast("資料讀取失敗，請稍後再試", true);
      }
    }

    function closeMyProfile() {
      const myProfileView = document.getElementById('myProfileView');
      myProfileView.classList.remove('view-enter'); myProfileView.classList.add('view-leave');
      setTimeout(() => { myProfileView.classList.add('hidden'); myProfileView.classList.remove('view-leave'); }, 300);
    }

    // 🌟 新增：打開歷史訂單與讀取資料
    async function openHistory() {
      const view = document.getElementById('historyView');
      const container = document.getElementById('historyListContainer');
      const loader = document.getElementById('historyLoading');
      
      view.classList.remove('hidden'); view.classList.add('view-enter');
      container.classList.add('hidden'); loader.classList.remove('hidden');
      window.scrollTo(0, 0);

      let uid = userProfile ? userProfile.userId : "test_uid";

      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: 'getHistory', lineUid: uid })
        });
        const result = await response.json();
        
        loader.classList.add('hidden');
        container.classList.remove('hidden');

        if (result.status === "success" && result.data.length > 0) {
          let html = '';
          result.data.forEach(order => {
            // 轉換日期格式
            const dateObj = new Date(order.time);
            const dateStr = `${dateObj.getFullYear()}/${(dateObj.getMonth()+1).toString().padStart(2, '0')}/${dateObj.getDate().toString().padStart(2, '0')}`;
            
            // 判斷狀態給予不同顏色
            const isValid = order.status !== '取消';
            const statusColor = isValid ? 'text-green-400 bg-green-900/30 border-green-700/50' : 'text-red-400 bg-red-900/30 border-red-700/50';
            const priceColor = isValid ? 'text-indigo-300' : 'text-gray-500 line-through';

            html += `
              <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-md flex justify-between items-center">
                <div>
                  <div class="text-xs text-gray-400 mb-1">${dateStr}</div>
                  <div class="font-bold text-gray-100 flex items-center gap-2">
                    <i class="fa-solid fa-gamepad text-indigo-500 text-sm"></i>
                    ${order.companion}
                  </div>
                </div>
                <div class="text-right">
                  <div class="text-xs px-2 py-0.5 rounded border mb-1 inline-block ${statusColor}">${order.status || '有效'}</div>
                  <div class="font-bold ${priceColor}">NT$ ${order.amount}</div>
                </div>
              </div>
            `;
          });
          container.innerHTML = html;
        } else {
          container.innerHTML = `<div class="text-center py-10 text-gray-500"><i class="fa-solid fa-box-open text-3xl mb-3"></i><br>您目前還沒有歷史訂單喔！</div>`;
        }
      } catch (error) {
        loader.classList.add('hidden');
        container.classList.remove('hidden');
        container.innerHTML = `<div class="text-center py-10 text-red-400">讀取失敗，請重新整理試試。</div>`;
      }
    }

    function closeHistory() {
      const view = document.getElementById('historyView');
      view.classList.remove('view-enter'); view.classList.add('view-leave');
      setTimeout(() => { view.classList.add('hidden'); view.classList.remove('view-leave'); }, 300);
    }

    // (下方保留：filterCategory, renderList, openProfile, goHome, togglePlay, calculateTotal, changeQuantity, openModal, closeModal, showToast, submitOrder 等函式...)
    
    function filterCategory(category, clickedBtn) {
      const btns = document.querySelectorAll('.cat-btn');
      btns.forEach(btn => btn.className = "cat-btn bg-gray-800 text-gray-300 border border-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all");
      clickedBtn.className = "cat-btn bg-white text-gray-900 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap shadow-sm transition-all";
      const grid = document.getElementById('companionsGrid'); const noDataMsg = document.getElementById('noDataMsg');
      let filtered = category !== '全部' ? DATABASE.companions.filter(c => c.tags.includes(category)) : DATABASE.companions;
      if(filtered.length === 0) { grid.innerHTML = ''; noDataMsg.classList.remove('hidden'); } 
      else { noDataMsg.classList.add('hidden'); renderList(filtered); }
    }

    function renderList(companions) {
      const grid = document.getElementById('companionsGrid'); let html = '';
      companions.forEach(c => {
        const firstTag = (c.tags || '').split(',')[0] || '人氣導師';
        html += `<div onclick="openProfile('${c.id}')" class="bg-gray-800 rounded-2xl overflow-hidden border border-gray-700 shadow-md transform transition active:scale-95 cursor-pointer"><div class="h-32 w-full bg-gray-700 relative"><img src="${c.avatar || ''}" class="w-full h-full object-cover"><div class="absolute bottom-2 left-2 bg-black/60 backdrop-blur-sm px-2 py-0.5 rounded text-[10px] text-white border border-white/20"><i class="fa-solid fa-star text-yellow-400 mr-1"></i>${c.rating || '5.0'}</div></div><div class="p-3"><h3 class="font-bold text-gray-100 text-sm truncate">${c.name || '導師'}</h3><div class="text-[11px] text-indigo-400 mt-1 bg-indigo-900/30 inline-block px-1.5 py-0.5 rounded border border-indigo-700/50 truncate max-w-full">${firstTag}</div></div></div>`;
      });
      grid.innerHTML = html;
    }

    function openProfile(id) {
      currentCompanionId = id; const companion = DATABASE.companions.find(c => c.id === id); if(!companion) return;
      document.getElementById('headerName').innerText = companion.name; document.getElementById('profileName').innerText = companion.name; document.getElementById('profileId').innerText = companion.id; document.getElementById('profileRating').innerText = companion.rating; document.getElementById('profileIntro').innerText = companion.intro; document.getElementById('modalTargetName').innerText = `- ${companion.name}`;
      const galleryContainer = document.getElementById('profileGallery'); let galleryHtml = ''; const images = (companion.gallery && companion.gallery.length > 0) ? companion.gallery : [companion.avatar];
      images.forEach(imgUrl => galleryHtml += `<div class="snap-center shrink-0 w-[85%] md:w-[70%]"><img src="${imgUrl}" class="w-full h-64 md:h-80 object-cover rounded-2xl shadow-md border border-gray-700"></div>`);
      galleryContainer.innerHTML = galleryHtml; audioPlayer.src = companion.audio || ""; resetPlayButton();
      document.getElementById('tagsContainer').innerHTML = (companion.tags || '').split(',').filter(Boolean).map(tag => `<span class="bg-indigo-900/30 text-indigo-300 border border-indigo-700/50 px-3 py-1 rounded-full text-xs font-semibold">${tag.trim()}</span>`).join('');
      let servicesHtml = ''; let optionsHtml = ''; DATABASE.services.filter(s => s.companion_id === id).forEach(srv => { const clr = srv.color || 'indigo'; const icn = srv.icon || 'fa-gamepad'; servicesHtml += `<div class="bg-gray-800 rounded-2xl p-4 mb-3 flex justify-between items-center border border-gray-700"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-${clr}-900/40 text-${clr}-400 rounded-xl flex justify-center items-center text-xl border border-${clr}-700/50"><i class="fa-solid ${icn}"></i></div><div><h3 class="font-bold text-gray-100">${srv.name}</h3><p class="text-gray-400 text-xs">${srv.desc}</p></div></div><div class="text-right"><div class="text-${clr}-400 font-bold">NT$ ${srv.price}</div><div class="text-gray-500 text-xs">/ ${srv.unit}</div></div></div>`; optionsHtml += `<option value="${srv.price}" data-unit="${srv.unit}">${srv.name} (NT$ ${srv.price} / ${srv.unit})</option>`; });
      document.getElementById('servicesContainer').innerHTML = servicesHtml || '<p class="text-gray-500 text-sm">尚無服務</p>'; document.getElementById('serviceSelect').innerHTML = optionsHtml; document.getElementById('reviewsContainer').innerHTML = '<p class="text-gray-500 text-sm">目前無評價</p>';
      const profile = document.getElementById('profileView'); profile.classList.remove('hidden'); profile.classList.add('view-enter'); galleryContainer.scrollTo(0, 0); window.scrollTo(0, 0); 
    }

    function goHome() {
      audioPlayer.pause(); resetPlayButton(); closeModal();       
      const profile = document.getElementById('profileView'); profile.classList.remove('view-enter'); profile.classList.add('view-leave');
      setTimeout(() => { profile.classList.add('hidden'); profile.classList.remove('view-leave'); currentCompanionId = null; window.scrollTo({ top: 0, behavior: 'smooth' }); }, 300);
    }

    function togglePlay() {
      const icon = document.getElementById('playIcon'); const text = document.getElementById('playText');
      if (!audioPlayer.src || audioPlayer.src.endsWith("undefined") || audioPlayer.src === window.location.href) return showToast("這位導師還沒有上傳專屬語音喔！", true);
      if (isPlaying) { audioPlayer.pause(); resetPlayButton(); } else { audioPlayer.play(); isPlaying = true; icon.className = 'fa-solid fa-circle-pause text-lg text-pink-400'; text.innerText = '語音播放中...'; text.className = 'font-bold text-sm text-pink-300 tracking-wider'; }
    }
    audioPlayer.onended = resetPlayButton;
    function resetPlayButton() { isPlaying = false; const icon = document.getElementById('playIcon'); const text = document.getElementById('playText'); if(icon && text) { icon.className = 'fa-solid fa-circle-play text-lg text-indigo-400'; text.innerText = '點擊試聽專屬語音'; text.className = 'font-bold text-sm text-indigo-200 tracking-wider'; } }
    function calculateTotal() { const sel = document.getElementById('serviceSelect'); if(!sel.options.length) return; const opt = sel.options[sel.selectedIndex]; document.getElementById('unitDisplay').innerText = opt.getAttribute('data-unit'); document.getElementById('totalPrice').innerText = parseInt(opt.value) * currentQuantity; }
    function changeQuantity(c) { if(currentQuantity + c >= 1) { currentQuantity += c; document.getElementById('quantityDisplay').innerText = currentQuantity; calculateTotal(); } }
    function openModal() { const overlay = document.getElementById('modalOverlay'); const sheet = document.getElementById('bookingSheet'); overlay.classList.remove('hidden'); void overlay.offsetWidth; overlay.classList.replace('opacity-0', 'opacity-100'); sheet.classList.remove('translate-y-full'); currentQuantity = 1; document.getElementById('quantityDisplay').innerText = 1; calculateTotal(); }
    function closeModal() { const overlay = document.getElementById('modalOverlay'); const sheet = document.getElementById('bookingSheet'); sheet.classList.add('translate-y-full'); overlay.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300); }
    function showToast(msg, isError=false) { const toast = document.getElementById('toast'); document.getElementById('toastMsg').innerText = msg; document.getElementById('toastIcon').className = isError ? 'fa-solid fa-circle-exclamation text-red-400 text-lg' : 'fa-solid fa-circle-check text-green-400 text-lg'; toast.classList.replace('opacity-0', 'opacity-100'); toast.classList.replace('-translate-y-5', 'translate-y-0'); setTimeout(() => { toast.classList.replace('opacity-100', 'opacity-0'); toast.classList.replace('translate-y-0', '-translate-y-5'); }, 3000); }

    async function submitOrder() {
      const discordId = document.getElementById('discordId').value; const memo = document.getElementById('memo').value || "無備註"; const companionName = document.getElementById('headerName').innerText; const serviceSelect = document.getElementById('serviceSelect');
      if(!serviceSelect.options.length) return showToast("請選擇服務", true);
      const serviceName = serviceSelect.options[serviceSelect.selectedIndex].text.split(' (')[0]; const qty = document.getElementById('quantityDisplay').innerText; const unit = document.getElementById('unitDisplay').innerText; const totalAmount = parseInt(document.getElementById('totalPrice').innerText);
      if(!discordId.trim()) return showToast("請填寫 Discord ID！", true);
      const btn = document.getElementById('submitBtn'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...'; btn.disabled = true;
      const uid = userProfile ? userProfile.userId : "test_uid"; const uName = userProfile ? userProfile.displayName : "網頁訪客";

      try {
        fetch(GAS_API_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'addOrder', lineUid: uid, userName: uName, companionName: companionName, totalAmount: totalAmount }) }).catch(e => console.error("寫入資料庫失敗", e)); 
        const flexData = { type: "bubble", header: { type: "box", layout: "vertical", backgroundColor: "#4F46E5", contents: [{ type: "text", text: "🎮 九霄劍閣 - 預約需求", color: "#FFFFFF", weight: "bold", size: "md" }] }, body: { type: "box", layout: "vertical", backgroundColor: "#111827", contents: [{ type: "text", text: `預約導師：${companionName}`, weight: "bold", size: "md", color: "#FFFFFF" }, { type: "text", text: `服務項目：${serviceName} x ${qty} ${unit}`, size: "xs", color: "#AAAAAA", margin: "md" }, { type: "text", text: `應付金額：NT$ ${totalAmount}`, size: "xl", color: "#818CF8", weight: "bold", margin: "md" }, { type: "separator", margin: "xl", color: "#333333" }, { type: "box", layout: "vertical", margin: "md", contents: [{ type: "text", text: `Discord：${discordId}`, color: "#DDDDDD", size: "xs" }, { type: "text", text: `備註：${memo}`, color: "#999999", size: "xs", margin: "xs", wrap: true }] }] } };
        if (liff.isLoggedIn()) { await liff.sendMessages([{ type: "flex", altText: `【九霄劍閣】預約單 - ${companionName}`, contents: flexData }]); showToast("✅ 預約成功！"); setTimeout(() => { liff.closeWindow(); }, 1200); } else { liff.login(); }
      } catch (error) { alert("發送失敗！請確認是否在 LINE App 內開啟。"); window.location.href = LINE_OFFICIAL_URL; } finally { btn.innerHTML = '確認送出訂單'; btn.disabled = false; }
    }
  </script>
</body>
